<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全域雷達｜匹夫有責｜彼夫有責楓葉戰情室</title>
    <style>
        /* =========================================
           1. 預設：太空深海風格 (Deep Ocean Space)
           ========================================= */
        :root {
            --ocean-bg: radial-gradient(circle at top, #0A192F 0%, #020C1B 100%);
            --panel-bg: rgba(16, 32, 64, 0.75);
            --panel-border: rgba(100, 255, 218, 0.2);
            --text-main: #E6F1FF;
            --text-muted: #8892B0;
            --neon-cyan: #64FFDA;
            --neon-green: #00E676;
            --neon-red: #FF5252;
            --neon-gold: #FFD700;
            --title-bg: rgba(0, 0, 0, 0.4);
            --badge-bg: rgba(0, 0, 0, 0.2);
            --sim-bg: rgba(0, 0, 0, 0.2);
            --input-bg: rgba(0, 0, 0, 0.3);
            --watch-bg: rgba(255, 255, 255, 0.05);
            --watch-border: rgba(255, 255, 255, 0.1);
            --card-shadow: rgba(0, 0, 0, 0.4);
            --log-bg: rgba(100, 255, 218, 0.05);
            --note-bg: rgba(255, 215, 0, 0.05);
            --ind-badge-bg: rgba(255, 255, 255, 0.1);
        }

        /* =========================================
           2. 切換：加拿大淡楓葉風格 (Light Maple)
           ========================================= */
        [data-theme="maple"] {
            --ocean-bg: linear-gradient(135deg, #FFF6E5 0%, #FAD7A1 100%);
            --panel-bg: rgba(255, 255, 255, 0.75);
            --panel-border: rgba(211, 84, 0, 0.3);
            --text-main: #3E2723;
            --text-muted: #795548;
            --neon-cyan: #D35400; 
            --neon-green: #2E7D32; 
            --neon-red: #C62828; 
            --neon-gold: #E67E22;
            --title-bg: rgba(255, 255, 255, 0.6);
            --badge-bg: rgba(255, 255, 255, 0.6);
            --sim-bg: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.8);
            --watch-bg: rgba(0, 0, 0, 0.03);
            --watch-border: rgba(0, 0, 0, 0.1);
            --card-shadow: rgba(0, 0, 0, 0.12);
            --log-bg: rgba(211, 84, 0, 0.05);
            --note-bg: rgba(211, 84, 0, 0.03);
            --ind-badge-bg: rgba(0, 0, 0, 0.08);
        }

        body {
            background: var(--ocean-bg); background-attachment: fixed; color: var(--text-main);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; padding: 20px; min-height: 100vh;
            transition: background 0.6s ease, color 0.6s ease; 
        }

        .theme-toggle-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: var(--panel-bg); color: var(--neon-cyan); border: 1px solid var(--neon-cyan);
            padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold;
            transition: 0.3s ease; backdrop-filter: blur(5px); box-shadow: 0 4px 15px var(--card-shadow); font-size: 14px;
        }

        .top-nav { max-width: 1200px; margin: 0 auto 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; border-bottom: 1px solid var(--panel-border); padding-bottom: 20px; }
        .search-box { background: var(--panel-bg); border: 1px solid var(--neon-cyan); border-radius: 30px; padding: 10px 25px; width: 100%; max-width: 400px; color: var(--text-main); font-size: 16px; outline: none; box-shadow: 0 0 15px var(--card-shadow); text-align: center; transition: 0.3s ease; }

        .header { text-align: center; width: 100%; }
        .header h1 { margin: 0; letter-spacing: 2px; text-shadow: 0 0 10px var(--panel-border); font-size: 28px; }
        .update-time { font-size: 12px; color: var(--neon-cyan); opacity: 0.8; margin-top: 5px; margin-bottom: 15px; }

        .system-alert { background: var(--note-bg); border: 1px solid var(--neon-gold); border-radius: 8px; padding: 12px 20px; margin: 10px auto 20px; max-width: 800px; color: var(--neon-gold); font-weight: bold; font-size: 15px; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); animation: pulse-border 2s infinite; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.2); } 50% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); } 100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.2); } }

        /* 👑 折疊區塊通用的樣式 */
        .collapsible-section { width: 100%; max-width: 1400px; margin: 10px auto 30px; border-radius: 8px; overflow: hidden; transition: 0.3s ease; }
        .collapsible-section summary { list-style: none; cursor: pointer; outline: none; }
        .collapsible-section summary::-webkit-details-marker { display: none; }

        .pool-title { 
            font-size: 20px; font-weight: bold; color: var(--neon-cyan); background: var(--title-bg); 
            padding: 12px 20px; border-left: 4px solid var(--neon-cyan); border-radius: 0 8px 8px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .pool-title::after { content: '▼'; font-size: 12px; opacity: 0.5; transition: 0.3s; }
        .collapsible-section[open] .pool-title::after { transform: rotate(180deg); }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; padding: 20px 0; }

        /* 🏷️ 產業分隔線樣式 */
        .industry-section-title { width: 100%; color: var(--neon-gold); font-size: 17px; font-weight: bold; margin-top: 25px; margin-bottom: 15px; border-bottom: 1px dashed var(--panel-border); padding-bottom: 8px; grid-column: 1 / -1; letter-spacing: 1px; }

        .card { background: var(--panel-bg); backdrop-filter: blur(10px); border-radius: 15px; padding: 22px; border: 1px solid var(--panel-border); border-top: 4px solid var(--text-muted); box-shadow: 0 10px 30px var(--card-shadow); transition: 0.4s ease; position: relative; }
        .card.is-buy { border-top-color: var(--neon-green); }

        .stock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .stock-id { font-size: 26px; font-weight: bold; color: var(--neon-cyan); }
        .stock-name { font-size: 18px; color: var(--text-main); margin-left: 10px; display: inline-flex; align-items: center;}
        .industry-badge { background: var(--ind-badge-bg); color: var(--text-main); font-size: 11px; font-weight: normal; padding: 2px 6px; border-radius: 4px; margin-left: 8px; border: 1px solid var(--panel-border); }
        .inst-badge { background: var(--badge-bg); padding: 4px 10px; border-radius: 4px; font-size: 12px; color: var(--neon-gold); border: 1px solid var(--panel-border); }

        .data-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: var(--text-muted); }
        .data-row b { color: var(--text-main); font-size: 16px; }
        .highlight { color: var(--neon-cyan) !important; font-size: 20px !important; }

        /* 🛠️ 模擬面板優化 */
        .sim-panel { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--panel-border); background: var(--sim-bg); border-radius: 8px; padding: 12px; }
        .sim-title { font-size: 12px; color: var(--neon-gold); margin-bottom: 10px; font-weight: bold; text-align: center; }
        .sim-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .sim-input-box { display: flex; flex-direction: column; gap: 4px; }
        .sim-input-label { font-size: 10px; color: var(--text-muted); padding-left: 2px; }
        .sim-input { width: 100%; background: var(--input-bg); border: 1px solid var(--panel-border); border-radius: 4px; color: var(--neon-cyan); padding: 5px; font-size: 13px; outline: none; box-sizing: border-box; }
        
        .sim-result { font-size: 12px; border-top: 1px dashed var(--panel-border); padding-top: 10px; line-height: 1.6; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 5px; }

        .action-box { margin-top: 15px; padding: 12px; text-align: center; font-weight: bold; border-radius: 6px; font-size: 15px; }
        .action-box.buy { background: rgba(0,255,0,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
        .action-box.watch { background: var(--watch-bg); color: var(--text-muted); border: 1px solid var(--watch-border); }

        .footer-copyright { text-align: center; padding: 40px 20px; margin-top: 60px; border-top: 1px solid var(--panel-border); color: var(--text-muted); font-size: 12px; line-height: 1.8; letter-spacing: 1px; }
    </style>
</head>
<body>

    <button id="theme-toggle" class="theme-toggle-btn">🍁 切換柔和楓葉版</button>

    <div class="top-nav">
        <div class="header">
            <h1>🌌 匹夫有責｜彼夫有責楓葉戰情室</h1>
            <div class="update-time" id="update-time">衛星同步中...</div>
            <div class="system-alert">🏖️ 【網頁提前通知】4/20 ~ 4/24 暫停更新 — 彼夫有擇大腦休息中！</div>
        </div>
        <input type="text" id="global-search" class="search-box" placeholder="🛸 啟動聲納：輸入代碼開啟模擬探測...">
    </div>

    <div id="main-container"></div>

    <footer class="footer-copyright">
        <p><span class="copyright-symbol">©</span> <span id="current-year"></span> 彼夫有擇楓葉戰情室. All Rights Reserved.</p>
        <p style="opacity: 0.6; margin-top: 10px;">⚠️ 本系統僅供量化投資模擬推演，投資有賺有賠，入市請謹慎評估。</p>
    </footer>

    <script>
        document.getElementById('current-year').innerText = new Date().getFullYear();

        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            const root = document.documentElement;
            if (root.getAttribute('data-theme') === 'maple') {
                root.removeAttribute('data-theme');
                themeBtn.innerText = '🍁 切換柔和楓葉版';
            } else {
                root.setAttribute('data-theme', 'maple');
                themeBtn.innerText = '🌌 切換深海太空版';
            }
        });

        let fullData = null;

        // 🎯 改進的模擬計算函數 (支援彈性比例)
        function updateSim(sid) {
            const price = parseFloat(document.getElementById(`price-${sid}`).value) || 0;
            const targetPct = parseFloat(document.getElementById(`target-pct-${sid}`).value) || 0;
            const stopPct = parseFloat(document.getElementById(`stop-pct-${sid}`).value) || 0;

            if (price > 0) {
                document.getElementById(`profit-${sid}`).innerText = (price * (1 + targetPct/100)).toFixed(2);
                document.getElementById(`loss-${sid}`).innerText = (price * (1 - stopPct/100)).toFixed(2);
            } else {
                document.getElementById(`profit-${sid}`).innerText = '--';
                document.getElementById(`loss-${sid}`).innerText = '--';
            }
        }

        function createCard(s, isWangYang = false) {
            const isBuy = s.action === '買入加碼';
            const instText = s.inst_buy > 0 ? '+' + s.inst_buy : s.inst_buy;
            const indText = s.industry || '未分類';

            // 🎯 這裡新增了比例輸入框
            let simHtml = `
                <div class="sim-panel">
                    <div class="sim-title">🛠️ Beta user 模擬倉</div>
                    <div class="sim-input-grid">
                        <div class="sim-input-box">
                            <span class="sim-input-label">持股價位</span>
                            <input type="number" id="price-${s.stock_id}" class="sim-input" placeholder="0.0" oninput="updateSim('${s.stock_id}')">
                        </div>
                        <div class="sim-input-box">
                            <span class="sim-input-label">持股股數</span>
                            <input type="number" id="shares-${s.stock_id}" class="sim-input" placeholder="1000">
                        </div>
                        <div class="sim-input-box">
                            <span class="sim-input-label">停利比例 (%)</span>
                            <input type="number" id="target-pct-${s.stock_id}" class="sim-input" value="50" oninput="updateSim('${s.stock_id}')">
                        </div>
                        <div class="sim-input-box">
                            <span class="sim-input-label">停損比例 (%)</span>
                            <input type="number" id="stop-pct-${s.stock_id}" class="sim-input" value="10" oninput="updateSim('${s.stock_id}')">
                        </div>
                    </div>
                    <div class="sim-result">
                        <div class="result-row"><span>🎯 模擬停利點參考</span><b id="profit-${s.stock_id}" style="color: var(--neon-cyan);">--</b></div>
                        <div class="result-row"><span>✂️ 模擬停損點參考</span><b id="stop-pct-label-${s.stock_id}" style="display:none"></b><b id="loss-${s.stock_id}" style="color: var(--neon-red);">--</b></div>
                    </div>
                </div>
            `;

            return `
                <div class="card ${isBuy ? 'is-buy' : ''}">
                    <div class="stock-header">
                        <div>
                            <span class="stock-id">${s.stock_id}</span>
                            <span class="stock-name">${s.stock_name} <span class="industry-badge">${indText}</span></span>
                        </div>
                        <div class="inst-badge">30日法人買賣超 ${instText}</div>
                    </div>
                    <div class="data-row"><span>現價</span><b class="highlight">${s.close}</b></div>
                    <div class="data-row"><span>成交量 (張)</span><b>${s.volume.toLocaleString()}</b></div>
                    <div class="data-row"><span>5MA / 30MA</span><b>${s.ma5} / ${s.ma30}</b></div>
                    <div class="action-box ${isBuy ? 'buy' : 'watch'}">${isBuy ? '🚀 買入加碼 (Launch)' : '📡 靜候觀察 (Standby)'}</div>
                    ${simHtml}
                </div>
            `;
        }

        fetch('plum_blossom_data.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(json_data => {
                fullData = json_data;
                document.getElementById('update-time').innerText = "⏱️ 雷達更新：" + json_data.last_updated + (json_data.api_cost_estimate ? " | 🔋 " + json_data.api_cost_estimate : "");
                
                const container = document.getElementById('main-container');
                const displayOrder = ["🌟 彼神黃金魚池", "🐅 三日成猛虎水池", "🔥 姊夫爆發小魚池", "🍁 楓大永動魚池", "🔭 自選觀察水域", "🌊 汪洋大魚"];

                displayOrder.forEach(poolName => {
                    if (json_data.pools[poolName] && json_data.pools[poolName].length > 0) {
                        const stocks = json_data.pools[poolName];
                        
                        // 🎯 建立摺疊區塊
                        const section = document.createElement('details');
                        section.className = 'pool-section';
                        
                        // 🌟 彼神與猛虎池預設開啟，其餘閉合
                        if (poolName === "🌟 彼神黃金魚池" || poolName === "🐅 三日成猛虎水池") {
                            section.open = true;
                        }

                        section.innerHTML = `<summary><div class="pool-title">${poolName}</div></summary>`;
                        const grid = document.createElement('div');
                        grid.className = 'grid-container';
                        
                        if (poolName === "🌊 汪洋大魚") {
                            let sortedStocks = stocks.sort((a, b) => (b.inst_buy - a.inst_buy) || (b.close - a.close));
                            const industryGroups = {};
                            sortedStocks.forEach(s => {
                                const ind = s.industry || "未分類產業";
                                if (!industryGroups[ind]) industryGroups[ind] = [];
                                industryGroups[ind].push(s);
                            });
                            for (const [ind, indStocks] of Object.entries(industryGroups)) {
                                grid.innerHTML += `<div class="industry-section-title">🏷️ 【${ind}】族群</div>`;
                                indStocks.forEach(s => grid.innerHTML += createCard(s, true));
                            }
                        } else {
                            stocks.forEach(s => grid.innerHTML += createCard(s, false));
                        }
                        
                        section.appendChild(grid);
                        container.appendChild(section);
                    }
                });
            })
            .catch(e => { console.error(e); });

        // 全域搜尋邏輯維持不變
    </script>
</body>
</html>
