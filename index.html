<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靜水流深｜彼得魚池戰情室</title>
    <style>
        /* 禪意與釣魚自然色票 */
        :root {
            --lake-bg: #E3F0F5;         /* 海洋淺藍 (背景) */
            --card-bg: rgba(255, 255, 255, 0.85); /* 浪花白 (卡片) */
            --ink-text: #1E3A5F;        /* 深海藍 (主文字) */
            --bamboo-green: #2E8B57;    /* 海藻綠 (買入/良好) */
            --water-blue: #0A5A7A;      /* 遠洋深藍 (強調色) */
            --copper-accent: #C27A3A;   /* 浮標古銅 (輔助色) */
            --alert-red: #D35400;       /* 警戒紅 (停損/警戒) */
        }
        
        body {
            background-color: var(--lake-bg);
            /* 模擬水面波紋的禪意背景 */
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(255,255,255,0.5) 0%, transparent 80%),
                linear-gradient(0deg, rgba(10, 90, 122, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(10, 90, 122, 0.04) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: var(--ink-text);
            font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", serif;
            margin: 0; padding: 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid rgba(44, 62, 80, 0.1);
            padding-bottom: 25px; margin-bottom: 40px;
            position: relative;
        }
        
        .header h1 { 
            color: var(--water-blue); 
            font-size: 32px; 
            letter-spacing: 8px; 
            margin-bottom: 10px;
            font-weight: 600;
        }
        .header p { 
            color: var(--copper-accent); 
            letter-spacing: 4px; 
            font-size: 15px; 
            font-style: italic;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px; max-width: 1200px; margin: 0 auto;
        }

        /* 水面浮標漂浮動畫 */
        @keyframes float-water {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(0.5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-top: 4px solid var(--bamboo-green);
            border-radius: 6px;
            padding: 24px;
            box-shadow: 0 10px 20px rgba(92, 131, 116, 0.05), 0 2px 5px rgba(0, 0, 0, 0.02);
            animation: float-water 7s ease-in-out infinite; /* 柔和的水波漂浮 */
            transition: all 0.4s ease;
            position: relative;
        }
        
        /* 讓每張卡片漂浮頻率錯開，像池子裡不同的浮標 */
        .card:nth-child(odd) { animation-delay: -2s; border-top-color: var(--copper-accent); }
        .card:nth-child(3n) { animation-delay: -4s; border-top-color: var(--water-blue); }

        .card:hover {
            box-shadow: 0 15px 30px rgba(92, 131, 116, 0.12);
            transform: translateY(-2px);
        }

        .stock-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 15px; border-bottom: 1px dashed rgba(44, 62, 80, 0.15); padding-bottom: 12px;
        }
        .stock-id { font-size: 28px; font-weight: bold; color: var(--water-blue); letter-spacing: 1px; }
        .stock-name { font-size: 16px; color: var(--ink-text); margin-left: 10px; font-weight: 500;}
        
        .inst-badge {
            background: rgba(169, 113, 66, 0.1); 
            color: var(--copper-accent);
            border: 1px solid rgba(169, 113, 66, 0.3);
            padding: 5px 12px; border-radius: 20px; font-size: 12px;
            font-weight: bold;
        }

        .data-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .label { color: #666; font-size: 14px; }
        .val { font-weight: 600; color: var(--ink-text); letter-spacing: 0.5px; }

        .action-box {
            margin-top: 25px; padding: 14px;
            text-align: center; font-weight: bold; letter-spacing: 4px;
            border-radius: 4px; transition: all 0.3s;
        }
        .buy { 
            background: rgba(92, 131, 116, 0.1); 
            border: 1px solid var(--bamboo-green); 
            color: var(--bamboo-green); 
        }
        .watch { 
            background: rgba(44, 62, 80, 0.03);
            border: 1px dashed rgba(44, 62, 80, 0.3); 
            color: #555; 
        }

        .footer-rules {
            font-size: 13px; margin-top: 20px; display: flex; justify-content: space-around;
            color: var(--ink-text); background: rgba(255,255,255,0.5); 
            padding: 10px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.03);
        }
        .target { color: var(--bamboo-green); font-weight: bold;} 
        .stop { color: var(--alert-red); font-weight: bold;} 

    </style>
</head>
<body>

    <div class="header">
        <h1>🎣 靜水流深｜隨波逐流</h1>
        <p>[ 台灣釣客精神：心如止水，伺機而動 ]</p>
    </div>

    <div class="grid-container" id="main-list">
        <!-- 數據注入處 -->
    </div>

    <script>
        fetch('plum_blossom_data.json')
            .then(res => {
                if (!res.ok) throw new Error('Data Sync Failed');
                return res.json();
            })
            .then(data => {
                const container = document.getElementById('main-list');
                if(data.length === 0) {
                    container.innerHTML = "<div style='grid-column: 1/-1; text-align:center; color: var(--copper-accent); letter-spacing: 3px; font-size: 16px; margin-top: 40px;'>[ 水面平靜無波，靜候大魚現蹤 ]</div>";
                    return;
                }
                data.forEach(s => {
                    const isBuy = s.action === '買入';
                    const actionClass = isBuy ? 'buy' : 'watch';
                    const actionText = isBuy ? '🎣 揮竿中魚' : '🌊 靜候魚訊';

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="stock-header">
                            <div>
                                <span class="stock-id">${s.stock_id}</span>
                                <span class="stock-name">${s.stock_name}</span>
                            </div>
                            <span class="inst-badge">🐟 魚訊強度 +${s.inst_buy}</span>
                        </div>
                        <div class="data-row"><span class="label">海浪高度</span><span class="val">${s.close}</span></div>
                        <div class="data-row"><span class="label">海浪強度</span><span class="val">${s.volume.toLocaleString()} 張</span></div>
                        <div class="data-row"><span class="label">海浪5日警戒</span><span class="val">${s.ma5}</span></div>
                        
                        <div class="action-box ${actionClass}">
                            [ ${actionText} ]
                        </div>
                        
                        <div class="footer-rules">
                            <span>漁貨豐收點: <span class="target">${s.target_price}</span></span>
                            <span>釣竿剪線點: <span class="stop">${s.stop_loss}</span></span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(e => {
                document.getElementById('main-list').innerHTML = "<div style='grid-column: 1/-1; text-align:center; color: var(--alert-red);'>[ 錯誤 ] 釣竿訊號遺失，請確認漁獲資料 (JSON) 是否連線正常。</div>";
            });
    </script>
</body>
</html>
