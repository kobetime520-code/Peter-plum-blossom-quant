<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 彼夫有擇模擬選股戰情室 V8.6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-deep:    #07090f;
            --bg-card:    #0d1117;
            --bg-surface: #161b22;
            --border:     rgba(255,255,255,0.07);
            --accent:     #58a6ff;
            --accent2:    #bc8cff;
            --accent3:    #79c0ff;
            --buy:        #3fb950;
            --watch:      #8b949e;
            --text:       #e6edf3;
            --text-muted: #8b949e;
            --gold:       #ffd700;
            --red:        #f85149;
            --card-radius:14px;
            --chip-color: rgba(255,255,255,0.15);
        }

        /* 2-A Canvas 粒子 + Neural SVG 背景 (V8.6) */
        #v86-canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        #v86-neural-svg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.13; }

        /* 2-B 打字機標語 (V8.6) */
        .v86-typewriter-wrap { text-align:center; padding: 6px 0 2px; font-size:.85rem; letter-spacing:.08em; color:var(--accent2); min-height:22px; position:relative; z-index:1; }
        .v86-tw-cursor::after { content:'|'; animation: blink 1s step-end infinite; }
        @keyframes blink { 50%{ opacity:0; } }

        /* 2-C 卡片甜蜜點區塊 + 評分條 (V8.6) */
        .sweet-zone {
            margin: 10px 0 4px;
            padding: 8px 10px;
            border: 1.5px dashed #ffd70066;
            border-radius: 8px;
            background: rgba(255,215,0,0.04);
            font-size: 12px;
        }
        .sweet-zone-title {
            font-size: 11px; font-weight: 700;
            color: var(--gold); letter-spacing:.05em; margin-bottom:5px;
        }
        .sweet-zone-range {
            font-size: 15px; font-weight: 700;
            color: var(--gold); margin-bottom: 4px;
        }
        .sweet-price-row { display:flex; gap:10px; flex-wrap:wrap; }
        .sweet-price-item { flex:1; min-width:80px; }
        .sweet-price-label { font-size:10px; color:var(--text-muted); }
        .sweet-price-val { font-size:13px; font-weight:700; }
        .score-bar-wrap { margin: 4px 0; }
        .score-bar-track { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; margin-top: 4px; }
        .score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
        .score-label { font-size:11px; color:var(--text-muted); display:flex; justify-content:space-between; }
        .grade-badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .grade-S { background:#ffd70033; color:#ffd700; border:1px solid #ffd70066; }
        .grade-A { background:#bc8cff33; color:#bc8cff; border:1px solid #bc8cff66; }
        .grade-B { background:#58a6ff33; color:#58a6ff; border:1px solid #58a6ff66; }
        .grade-C { background:#3fb95033; color:#3fb950; border:1px solid #3fb95066; }
        .grade-X { background:#8b949e22; color:#8b949e; border:1px solid #8b949e44; }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            min-height: 100vh;
            position: relative;
        }

        /* ── 頂部橫幅 ── */
        .top-banner {
            position: relative; z-index: 2;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
            border-bottom: 1px solid var(--border);
            padding: 18px 24px 12px;
            text-align: center;
        }
        .top-banner h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: .06em; }
        .top-banner h1 .version-badge {
            display: inline-block;
            font-size: .65rem;
            background: linear-gradient(90deg,#58a6ff,#bc8cff);
            color: #000;
            border-radius: 6px;
            padding: 1px 7px;
            vertical-align: middle;
            margin-left: 6px;
            font-weight: 700;
        }
        .top-banner .subtitle {
            font-size: .8rem;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: .04em;
        }

        /* 2-A Canvas 粒子 + Neural SVG V8.6 */
        <canvas id="v86-canvas-bg"></canvas>
        <svg id="v86-neural-svg" xmlns="http://www.w3.org/2000/svg"></svg>

        /* ── 頁面骨架 ── */
        #app-wrapper {
            position: relative; z-index: 1;
            display: flex;
            min-height: calc(100vh - 72px);
        }

        /* ── 左側選單 ── */
        #sidebar {
            width: 220px;
            flex-shrink: 0;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 16px 0;
            overflow-y: auto;
            position: sticky;
            top: 0;
            height: calc(100vh - 72px);
        }
        .sidebar-title {
            font-size: .68rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: .12em;
            padding: 0 16px 8px;
            text-transform: uppercase;
        }
        .pool-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 10px 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: .85rem;
            text-align: left;
            transition: all .18s;
            border-left: 3px solid transparent;
        }
        .pool-btn:hover { background: rgba(88,166,255,.06); color: var(--text); }
        .pool-btn.active {
            background: rgba(88,166,255,.1);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 600;
        }
        .pool-btn .badge {
            margin-left: auto;
            background: var(--bg-surface);
            border-radius: 10px;
            padding: 1px 7px;
            font-size: .72rem;
            color: var(--text-muted);
        }

        /* ── 主區域 ── */
        #main-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ── 儀表板 ── */
        #dashboard-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px;
        }
        .dash-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            padding: 16px;
        }
        .dash-card h4 {
            font-size: .75rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: .1em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .dash-stat { display: flex; gap: 20px; }
        .dash-stat-item { text-align: center; flex: 1; }
        .dash-stat-num { font-size: 2rem; font-weight: 800; line-height: 1; }
        .dash-stat-label { font-size: .72rem; color: var(--text-muted); margin-top: 4px; }
        .buy-num { color: var(--buy); }
        .watch-num { color: var(--watch); }

        /* ── 篩選列 ── */
        #filter-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            padding: 12px 16px;
        }
        #filter-bar input, #filter-bar select {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 6px 12px;
            font-size: .85rem;
            outline: none;
        }
        #filter-bar input:focus, #filter-bar select:focus {
            border-color: var(--accent);
        }
        .filter-label { font-size: .8rem; color: var(--text-muted); }

        /* ── 卡片網格 ── */
        #cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
        }

        /* ── 股票卡片 ── */
        .stock-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            padding: 0;
            overflow: hidden;
            transition: transform .18s, box-shadow .18s;
            position: relative;
        }
        .stock-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,.4);
        }
        /* V8.6 chip_signal 頂部色帶 */
        .stock-card::before {
            content: '';
            display: block;
            height: 3px;
            background: var(--chip-color);
        }
        .card-body { padding: 14px 16px 16px; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .card-name { font-size: 1rem; font-weight: 700; }
        .card-id { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
        .card-action {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .action-buy { background: rgba(63,185,80,.15); color: var(--buy); border: 1px solid rgba(63,185,80,.3); }
        .action-watch { background: rgba(139,148,158,.1); color: var(--watch); border: 1px solid rgba(139,148,158,.2); }

        .card-price { font-size: 1.6rem; font-weight: 800; margin-bottom: 2px; }
        .card-meta { font-size: .75rem; color: var(--text-muted); margin-bottom: 10px; }

        .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .tag {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: .7rem;
            font-weight: 600;
        }
        .tag-industry { background: rgba(88,166,255,.12); color: var(--accent3); }
        .tag-theme { background: rgba(188,140,255,.1); color: var(--accent2); font-size:.68rem; }

        .card-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }
        .metric-item { }
        .metric-label { font-size: .67rem; color: var(--text-muted); }
        .metric-value { font-size: .85rem; font-weight: 600; }

        .card-inst {
            display: flex;
            gap: 10px;
            padding: 8px 10px;
            background: var(--bg-surface);
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: .8rem;
        }
        .inst-item { flex: 1; text-align: center; }
        .inst-label { font-size: .65rem; color: var(--text-muted); }
        .inst-val { font-weight: 700; }

        .card-targets {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: .8rem;
        }
        .target-item { padding: 6px 10px; background: var(--bg-surface); border-radius: 8px; }
        .target-label { font-size: .67rem; color: var(--text-muted); }
        .target-val { font-weight: 700; }

        /* ── 模擬面板 ── */
        #sim-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--card-radius);
            padding: 20px;
        }
        #sim-panel h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
        .sim-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .sim-field { display: flex; flex-direction: column; gap: 4px; }
        .sim-field label { font-size: .75rem; color: var(--text-muted); }
        .sim-field input, .sim-field select {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 8px 12px;
            font-size: .9rem;
            outline: none;
        }
        #sim-result {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-surface);
            border-radius: 10px;
            font-size: .88rem;
            line-height: 1.9;
        }
        .sim-row { display: flex; justify-content: space-between; padding: 3px 0; }
        .sim-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
        .sim-highlight { color: var(--accent); font-weight: 700; }
        .sim-buy { color: var(--buy); font-weight: 700; }
        .sim-danger { color: var(--red); font-weight: 700; }

        /* ── 狀態列 ── */
        #status-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(13,17,23,.95);
            border-top: 1px solid var(--border);
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: .75rem;
            color: var(--text-muted);
        }
        #status-bar .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--buy); }
        #status-bar .sep { opacity: .3; }

        /* ── 空狀態 ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

        /* ── 2-D 公式橫幅 V8.6 ── */
        .v86-formula-banner {
            position: relative; z-index: 2;
            background: linear-gradient(90deg,
                rgba(88,166,255,.12) 0%,
                rgba(188,140,255,.12) 33%,
                rgba(63,185,80,.12) 66%,
                rgba(255,215,0,.10) 100%);
            border-top: 1px solid rgba(88,166,255,.15);
            border-bottom: 1px solid rgba(255,215,0,.10);
            padding: 8px 20px;
            text-align: center;
            font-size: .78rem;
            font-weight: 600;
            letter-spacing: .06em;
            color: var(--text-muted);
        }
        .v86-formula-banner span { color: var(--accent); }
    </style>
</head>
<body>

    <!-- 2-A Canvas 粒子 + Neural SVG V8.6 -->
    <canvas id="v86-canvas-bg"></canvas>
    <svg id="v86-neural-svg" xmlns="http://www.w3.org/2000/svg"></svg>

    <!-- 頂部橫幅 -->
    <div class="top-banner">
        <h1>🌌 彼夫有擇模擬選股戰情室 <span class="version-badge">V8.6</span></h1>
        <!-- 2-B 打字機動態標語 V8.6 -->
        <div class="v86-typewriter-wrap">
            <span id="v86-tw-text"></span><span class="v86-tw-cursor"></span>
        </div>
        <div class="subtitle" id="last-updated">載入中…</div>
    </div>

    <!-- 2-D 戰情室公式橫幅 V8.6 -->
    <div class="v86-formula-banner">
        <span>① 先選對題材</span> →
        <span>② 籌碼與型態</span> →
        <span>③ 量比價先</span> →
        <span>④ 量增價漲做多</span> →
        <span>⑤ 甜蜜點進場 ✦ 停利×1.5 停損×0.9</span>
        <p style="color:var(--text-muted);font-size:.8rem;margin-top:7px;letter-spacing:.05em">先選對題材，再看籌碼與型態，量比價先，量增價漲做多 ✦ 彼夫有責戰情室 V8.6</p>
    </div>

    <div id="app-wrapper">
        <!-- 左側選單 -->
        <nav id="sidebar">
            <div class="sidebar-title">魚池選單</div>
            <div id="pool-nav"></div>
        </nav>

        <!-- 主區域 -->
        <main id="main-container">

            <!-- 儀表板 -->
            <section id="dashboard-section">
                <div class="dash-card">
                    <h4>📊 多空訊號</h4>
                    <div class="dash-stat">
                        <div class="dash-stat-item">
                            <div class="dash-stat-num buy-num" id="buy-count">—</div>
                            <div class="dash-stat-label">買入加碼</div>
                        </div>
                        <div class="dash-stat-item">
                            <div class="dash-stat-num watch-num" id="watch-count">—</div>
                            <div class="dash-stat-label">靜候觀察</div>
                        </div>
                    </div>
                </div>
                <div class="dash-card">
                    <h4>🌊 汪洋大魚</h4>
                    <canvas id="action-chart" height="80"></canvas>
                </div>
                <div class="dash-card">
                    <h4>🏭 產業分佈</h4>
                    <canvas id="industry-chart" height="80"></canvas>
                </div>
            </section>

            <!-- 篩選列 -->
            <div id="filter-bar">
                <span class="filter-label">🔍</span>
                <input type="text" id="search-input" placeholder="搜尋股票名稱或代號…" style="flex:1;min-width:160px;">
                <select id="action-filter">
                    <option value="">全部訊號</option>
                    <option value="買入加碼">買入加碼</option>
                    <option value="靜候觀察">靜候觀察</option>
                </select>
                <select id="sort-filter">
                    <option value="strength">強勢評分↓</option>
                    <option value="inst">法人買超↓</option>
                    <option value="vol">成交量↓</option>

            <!-- 卡片網格 -->
            <div id="cards-grid"></div>

            <!-- 模擬面板 -->
            <section id="sim-panel">
                <h3>🧮 模擬試算</h3>
                <div class="sim-grid">
                    <div class="sim-field">
                        <label>股票代號</label>
                        <select id="sim-stock">
                            <option value="">— 請先切換魚池 —</option>
                        </select>
                    </div>
                    <div class="sim-field">
                        <label>買入價格</label>
                        <input type="number" id="sim-price" placeholder="自動帶入甜蜜點低點">
                    </div>
                    <div class="sim-field">
                        <label>買入張數</label>
                        <input type="number" id="sim-lots" value="1" min="1">
                    </div>
                    <div class="sim-field">
                        <label>手續費率 (%)</label>
                        <input type="number" id="sim-fee" value="0.1425" step="0.01">
                    </div>

                <div id="sim-result">← 請選擇股票並輸入數值後，結果自動顯示於此</div>
            </section>

        </main>
    </div>

    <!-- 狀態列 -->
    <div id="status-bar">
        <div class="dot"></div>
        <span id="api-cost">—</span>
        <span class="sep">|</span>
        <span id="status-time">—</span>
    </div>

    <script>
    // =====================================================================
    // 彼夫有責戰情室 V8.6 前端邏輯
    // =====================================================================

    // 2-E Canvas 粒子系統 V8.6
    (function initParticles() {
        const canvas = document.getElementById('v86-canvas-bg');
        const ctx = canvas.getContext('2d');
        let W, H, particles = [];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const PARTICLE_COUNT = 130;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: Math.random() * 1.4 + 0.3,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                a: Math.random() * 0.5 + 0.15,
                hue: Math.random() < 0.5 ? 210 : 270
            });
        }

        function tick() {
            ctx.clearRect(0, 0, W, H);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue},80%,70%,${p.a})`;
                ctx.fill();
            });
            requestAnimationFrame(tick);
        }
        tick();
    })();

    // 2-F Neural SVG V8.6
    (function initNeural() {
        const svg = document.getElementById('v86-neural-svg');
        const nodes = [
            {x:'12%',y:'20%'},{x:'30%',y:'10%'},{x:'50%',y:'18%'},
            {x:'70%',y:'8%'}, {x:'88%',y:'22%'},{x:'20%',y:'55%'},
            {x:'45%',y:'50%'},{x:'75%',y:'48%'},{x:'60%',y:'80%'}
        ];
        const edges = [
            [0,1],[1,2],[2,3],[3,4],[0,5],[1,6],[2,6],[3,7],[4,7],
            [5,6],[6,7],[6,8],[7,8]
        ];
        let ns = '';
        edges.forEach(([a,b]) => {
            ns += `<line x1="${nodes[a].x}" y1="${nodes[a].y}" x2="${nodes[b].x}" y2="${nodes[b].y}" stroke="#58a6ff" stroke-width="0.8"/>`;
        });
        nodes.forEach(n => {
            ns += `<circle cx="${n.x}" cy="${n.y}" r="3" fill="#bc8cff"/>`;
        });
        svg.innerHTML = ns;
    })();

    // 2-G 打字機標語 V8.6
    (function initTypewriter() {
        const phrases = [
            '先選對題材，再看籌碼與型態',
            '量比價先，量增價漲做多',
            '甜蜜點進場，停利×1.5 停損×0.9',
            '法人三大籌碼：外資＋投信雙買最強',
            '強勢評分 100 分，彼夫有責戰情室 V8.6'
        ];
        const el = document.getElementById('v86-tw-text');
        let pi = 0, ci = 0, deleting = false;
        function step() {
            const phrase = phrases[pi];
            if (!deleting) {
                el.textContent = phrase.slice(0, ++ci);
                if (ci === phrase.length) { deleting = true; setTimeout(step, 2200); return; }
            } else {
                el.textContent = phrase.slice(0, --ci);
                if (ci === 0) { deleting = false; pi = (pi + 1) % phrases.length; }
            }
            setTimeout(step, deleting ? 38 : 68);
        }
        step();
    })();

    // ── 全域資料 ──
    let allData = null;
    let currentPool = '';
    let currentStocks = [];

    // ── 讀取資料 ──
    async function loadData() {
        try {
            const res = await fetch('plum_blossom_data.json?t=' + Date.now());
            allData = await res.json();
            initUI();
        } catch (e) {
            document.getElementById('last-updated').textContent = '❌ 資料載入失敗，請確認 plum_blossom_data.json 存在';
        }
    }

    function initUI() {
        // 更新狀態列
        document.getElementById('last-updated').textContent = '最後更新：' + (allData.last_updated || '—');
        document.getElementById('api-cost').textContent = allData.api_cost_estimate || '—';
        document.getElementById('status-time').textContent = allData.last_updated || '—';

        // 儀表板
        const stats = allData.dashboard_stats || {};
        const ratio = stats.action_ratio || {};
        document.getElementById('buy-count').textContent = ratio.buy ?? '—';
        document.getElementById('watch-count').textContent = ratio.watch ?? '—';
        renderActionChart(ratio);
        renderIndustryChart(stats.industry_distribution || []);

        // 建立側欄
        const nav = document.getElementById('pool-nav');
        nav.innerHTML = '';
        const pools = allData.pools || {};
        Object.entries(pools).forEach(([name, stocks]) => {
            const btn = document.createElement('button');
            btn.className = 'pool-btn';
            btn.innerHTML = `<span>${name}</span><span class="badge">${stocks.length}</span>`;
            btn.onclick = () => switchPool(name);
            nav.appendChild(btn);
        });

        // 預設顯示第一個魚池
        const firstPool = Object.keys(pools)[0];
        if (firstPool) switchPool(firstPool);

        // 篩選事件
        document.getElementById('search-input').addEventListener('input', renderCards);
        document.getElementById('action-filter').addEventListener('change', renderCards);
        document.getElementById('sort-filter').addEventListener('change', renderCards);

        // 模擬試算
        ['sim-stock','sim-price','sim-lots','sim-fee'].forEach(id => {
            document.getElementById(id).addEventListener('input', calcSim);
            document.getElementById(id).addEventListener('change', calcSim);
        });
        document.getElementById('sim-stock').addEventListener('change', autoFillSimPrice);
    }

    function switchPool(name) {
        currentPool = name;
        const pools = allData.pools || {};
        currentStocks = pools[name] || [];

        document.querySelectorAll('.pool-btn').forEach((btn, i) => {
            btn.classList.toggle('active', Object.keys(pools)[i] === name);
        });

        // 更新模擬選股下拉
        const sel = document.getElementById('sim-stock');
        sel.innerHTML = '<option value="">— 選擇股票 —</option>';
        currentStocks.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.stock_id;
            opt.textContent = `${s.stock_id} ${s.stock_name}`;
            sel.appendChild(opt);
        });

        renderCards();
    }

    function renderCards() {
        const grid = document.getElementById('cards-grid');
        const q = document.getElementById('search-input').value.toLowerCase();
        const actionFilter = document.getElementById('action-filter').value;
        const sortBy = document.getElementById('sort-filter').value;

        let stocks = [...currentStocks];

        if (q) stocks = stocks.filter(s =>
            s.stock_id?.includes(q) ||
            s.stock_name?.toLowerCase().includes(q) ||
            s.industry?.toLowerCase().includes(q)
        );
        if (actionFilter) stocks = stocks.filter(s => s.action === actionFilter);

        if (sortBy === 'strength') stocks.sort((a,b) => (b.strength_score||0)-(a.strength_score||0));
        else if (sortBy === 'inst') stocks.sort((a,b) => (b.inst_buy||0)-(a.inst_buy||0));
        else if (sortBy === 'vol') stocks.sort((a,b) => (b.volume||0)-(a.volume||0));

        if (stocks.length === 0) {
            grid.innerHTML = '<div class="empty-state"><div class="icon">🌊</div><div>目前無符合條件的股票</div></div>';
            return;
        }

        grid.innerHTML = stocks.map(s => createCard(s)).join('');
    }

    function createCard(s) {
        const isBuy = s.action === '買入加碼';

        // V8.6 chip_signal 頂部色帶
        const chipColors = {
            '雙買': '#FFD700',
            '投信單買': '#00E676',
            '外資單買': '#4fc3f7',
            '無買': 'rgba(139,148,158,0.3)'
        };
        const chipColor = chipColors[s.chip_signal] || chipColors['無買'];

        const instGrade = s.inst_grade || 'X';
        const gradeBadge = `<span class="grade-badge grade-${instGrade}">${instGrade}</span>`;

        const scoreVal = Math.min(s.strength_score || 0, 100);
        const scoreBarGrad = scoreVal >= 70
            ? 'linear-gradient(90deg,#ffd700,#ff9500)'
            : scoreVal >= 45
            ? 'linear-gradient(90deg,#58a6ff,#bc8cff)'
            : 'linear-gradient(90deg,#3fb950,#58a6ff)';

        // V8.6 甜蜜點區塊
        const sweetLow = s.sweet_buy_low || 0;
        const sweetHigh = s.sweet_buy_high || 0;
        const firstTarget = s.first_target || 0;
        const hasSweetData = sweetLow > 0 && isBuy;

        const sweetBlock = hasSweetData ? `
            <div class="sweet-zone">
                <div class="sweet-zone-title">🍯 Joe 甜蜜買進區間</div>
                <div class="sweet-zone-range">${sweetLow} – ${sweetHigh}</div>
                <div class="sweet-price-row">
                    <div class="sweet-price-item">
                        <div class="sweet-price-label">第一停利 +15%</div>
                        <div class="sweet-price-val" style="color:#3fb950">${firstTarget}</div>
                    </div>
                    <div class="sweet-price-item">
                        <div class="sweet-price-label">目標價 ×1.5</div>
                        <div class="sweet-price-val" style="color:#ffd700">${s.target_price}</div>
                    </div>
                    <div class="sweet-price-item">
                        <div class="sweet-price-label">停損 ×0.9</div>
                        <div class="sweet-price-val" style="color:#f85149">${s.stop_loss}</div>
                    </div>
                </div>
            </div>` : '';

        const themeTag = s.theme_tag ? `<span class="tag tag-theme">${s.theme_tag}</span>` : '';

        return `
        <div class="stock-card" style="--chip-color:${chipColor}">
            <div class="card-body">
                <div class="card-header">
                    <div>
                        <div class="card-name">${s.stock_name || s.stock_id}</div>
                        <div class="card-id">${s.stock_id}</div>
                    </div>
                    <span class="card-action ${isBuy ? 'action-buy' : 'action-watch'}">${s.action}</span>
                </div>

                <div class="card-price">${s.close}</div>
                <div class="card-meta">量 ${(s.volume||0).toLocaleString()} 張 ｜ 量比 ${s.vol_ratio??'—'}×</div>

                <div class="card-tags">
                    ${s.industry ? `<span class="tag tag-industry">${s.industry}</span>` : ''}
                    ${themeTag}
                    ${s.chip_signal ? `<span class="tag" style="background:${chipColor}22;color:${chipColor};border:1px solid ${chipColor}44">${s.chip_signal}</span>` : ''}
                    ${gradeBadge}
                    ${s.bull_align ? '<span class="tag" style="background:rgba(255,215,0,.1);color:#ffd700;font-size:.68rem">多頭排列</span>' : ''}
                </div>

                <div class="score-bar-wrap">
                    <div class="score-label">
                        <span>強勢評分</span>
                        <span style="color:${scoreVal>=70?'#ffd700':scoreVal>=45?'#58a6ff':'#3fb950'};font-weight:700">${scoreVal} 分</span>
                    </div>
                    <div class="score-bar-track">
                        <div class="score-bar-fill" style="width:${scoreVal}%;background:${scoreBarGrad};"></div>
                    </div>
                </div>

                ${sweetBlock}

                <div class="card-metrics">
                    <div class="metric-item">
                        <div class="metric-label">MA5</div>
                        <div class="metric-value">${s.ma5}</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">MA10</div>
                        <div class="metric-value">${s.ma10||'—'}</div>
                    </div>
                    <div class="metric-item">
                        <div class="metric-label">RSI14</div>
                        <div class="metric-value" style="color:${(s.rsi14||50)>70?'#f85149':(s.rsi14||50)<30?'#ffd700':'inherit'}">${s.rsi14||'—'}</div>
                    </div>
                </div>

                <div class="card-inst">
                    <div class="inst-item">
                        <div class="inst-label">法人合計</div>
                        <div class="inst-val" style="color:${(s.inst_buy||0)>0?'#3fb950':'#f85149'}">${(s.inst_buy||0).toLocaleString()}</div>
                    </div>
                    <div class="inst-item">
                        <div class="inst-label">外資</div>
                        <div class="inst-val" style="color:${(s.foreign_buy||0)>0?'#4fc3f7':'#f85149'}">${(s.foreign_buy||0).toLocaleString()}</div>
                    </div>
                    <div class="inst-item">
                        <div class="inst-label">投信</div>
                        <div class="inst-val" style="color:${(s.trust_buy||0)>0?'#00E676':'#f85149'}">${(s.trust_buy||0).toLocaleString()}</div>
                    </div>
                </div>

                ${!hasSweetData ? `
                <div class="card-targets">
                    <div class="target-item">
                        <div class="target-label">目標價 ×1.5</div>
                        <div class="target-val" style="color:#ffd700">${s.target_price}</div>
                    </div>
                    <div class="target-item">
                        <div class="target-label">停損 ×0.9</div>
                        <div class="target-val" style="color:#f85149">${s.stop_loss}</div>
                    </div>
                </div>` : ''}
            </div>
        </div>`;
    }

    function renderActionChart(ratio) {
        const ctx = document.getElementById('action-chart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['買入加碼', '靜候觀察'],
                datasets: [{
                    data: [ratio.buy || 0, ratio.watch || 0],
                    backgroundColor: ['rgba(63,185,80,.7)', 'rgba(139,148,158,.3)'],
                    borderColor: ['#3fb950', '#8b949e'],
                    borderWidth: 1
                }]
            },
            options: {
                plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
                cutout: '65%'
            }
        });
    }

    function renderIndustryChart(dist) {
        if (!dist || dist.length === 0) return;
        const ctx = document.getElementById('industry-chart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: dist.slice(0, 8).map(d => d.industry.slice(0, 6)),
                datasets: [{
                    data: dist.slice(0, 8).map(d => d.count),
                    backgroundColor: 'rgba(88,166,255,.5)',
                    borderColor: '#58a6ff',
                    borderWidth: 1,
                    borderRadius: 4
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: {
                    x: { ticks: { color: '#8b949e', font: { size: 9 } }, grid: { display: false } },
                    y: { ticks: { color: '#8b949e', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,.04)' } }
                }
            }
        });
    }

    // 2-E 模擬面板：自動帶入甜蜜點低點
    function autoFillSimPrice() {
        const sid = document.getElementById('sim-stock').value;
        if (!sid) return;
        const stock = currentStocks.find(s => s.stock_id === sid);
        if (!stock) return;
        const sweetLow = stock.sweet_buy_low || stock.close || '';
        document.getElementById('sim-price').value = sweetLow || '';
        calcSim();
    }

    function calcSim() {
        const sid = document.getElementById('sim-stock').value;
        const price = parseFloat(document.getElementById('sim-price').value);
        const lots = parseInt(document.getElementById('sim-lots').value) || 1;
        const feeRate = parseFloat(document.getElementById('sim-fee').value) / 100 || 0.001425;

        const result = document.getElementById('sim-result');
        if (!sid || isNaN(price) || price <= 0) {
            result.innerHTML = '← 請選擇股票並輸入買入價格';
            return;
        }

        const stock = currentStocks.find(s => s.stock_id === sid);
        if (!stock) return;

        const totalCost = price * lots * 1000;
        const buyFee = Math.max(Math.round(totalCost * feeRate), 20);
        const totalIn = totalCost + buyFee;

        const target15 = (stock.first_target || price * 1.15);
        const target15Cost = target15 * lots * 1000;
        const sellFee15 = Math.max(Math.round(target15Cost * feeRate), 20);
        const sellTax15 = Math.round(target15Cost * 0.003);
        const profit15 = target15Cost - sellFee15 - sellTax15 - totalIn;

        const target15p = ((target15 - price) / price * 100).toFixed(1);
        const stopPrice = stock.stop_loss || price * 0.9;
        const stopCost = stopPrice * lots * 1000;
        const sellFeeStop = Math.max(Math.round(stopCost * feeRate), 20);
        const sellTaxStop = Math.round(stopCost * 0.003);
        const loss = stopCost - sellFeeStop - sellTaxStop - totalIn;

        const targetPrice = stock.target_price || price * 1.5;
        const targetCost = targetPrice * lots * 1000;
        const sellFeeTarget = Math.max(Math.round(targetCost * feeRate), 20);
        const sellTaxTarget = Math.round(targetCost * 0.003);
        const profitTarget = targetCost - sellFeeTarget - sellTaxTarget - totalIn;

        result.innerHTML = `
        <div class="sim-row"><span>股票</span><span class="sim-highlight">${stock.stock_id} ${stock.stock_name}</span></div>
        <div class="sim-row"><span>買入價格</span><span>${price} 元 × ${lots} 張</span></div>
        <div class="sim-row"><span>買入成本（含手續費）</span><span>${totalIn.toLocaleString()} 元</span></div>
        <hr class="sim-divider">
        <div class="sim-row"><span>🍯 甜蜜區間</span><span style="color:#ffd700">${stock.sweet_buy_low||'—'} – ${stock.sweet_buy_high||'—'}</span></div>
        <div class="sim-row"><span>🎯 第一停利 +${target15p}%（×1.15）</span><span class="sim-buy">+${profit15.toLocaleString()} 元</span></div>
        <div class="sim-row"><span>🏆 目標價（×1.5）</span><span class="sim-buy">+${profitTarget.toLocaleString()} 元</span></div>
        <div class="sim-row"><span>🛑 停損觸發（×0.9）</span><span class="sim-danger">${loss.toLocaleString()} 元</span></div>
        <hr class="sim-divider">
        <div class="sim-row"><span>⚠️ 風報比（停利第一目標/停損）</span><span class="sim-highlight">${Math.abs(profit15/loss).toFixed(2)}：1</span></div>
        `;
    }

    loadData();

    // ── 粒子啟動 ──
    (function() {
        const canvas = document.getElementById('v86-canvas-bg');
        if (!canvas || !canvas.getContext) return;
        const ctx = canvas.getContext('2d');
        let W = canvas.width = window.innerWidth;
        let H = canvas.height = window.innerHeight;
        window.addEventListener('resize', () => {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        });
        const particles = Array.from({length: 130}, () => ({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.4 + 0.3,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            a: Math.random() * 0.5 + 0.15,
            hue: Math.random() < 0.5 ? 210 : 270
        }));
        function tick() {
            ctx.clearRect(0, 0, W, H);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue},80%,70%,${p.a})`;
                ctx.fill();
            });
            requestAnimationFrame(tick);
        }
        tick();
    })();
    </script>
