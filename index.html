<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全域雷達｜彼我還楓姊夫魚池戰情室</title>
    <style>
        :root {
            /* 深海與太空背景 */
            --ocean-bg: radial-gradient(circle at top, #0A192F 0%, #020C1B 100%);
            /* 太空透明面板 (Glassmorphism) */
            --panel-bg: rgba(16, 32, 64, 0.65);
            --panel-border: rgba(100, 255, 218, 0.2);
            /* 發光霓虹色系 */
            --text-main: #E6F1FF;
            --text-muted: #8892B0;
            --neon-cyan: #64FFDA;
            --neon-green: #00E676;
            --neon-red: #FF5252;
            --neon-gold: #FFD700;
        }

        body {
            background: var(--ocean-bg); 
            background-attachment: fixed;
            color: var(--text-main);
            font-family: "PingFang TC", "Microsoft JhengHei", "Segoe UI", sans-serif;
            margin: 0; padding: 20px; min-height: 100vh;
        }

        .header { 
            text-align: center; margin-bottom: 30px; 
            border-bottom: 1px solid var(--panel-border); padding-bottom: 20px; 
        }
        .header h1 { color: var(--text-main); letter-spacing: 2px; text-shadow: 0 0 10px rgba(100,255,218,0.3); }
        .update-time { 
            font-size: 13px; background: rgba(100, 255, 218, 0.1); padding: 6px 15px; 
            border-radius: 20px; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); 
            display: inline-block; font-weight: bold; letter-spacing: 1px;
        }
        
        .pool-section { margin-bottom: 40px; }
        .pool-title { 
            font-size: 20px; font-weight: bold; color: var(--neon-cyan);
            background: rgba(10, 25, 47, 0.8); padding: 10px 20px; 
            border-left: 4px solid var(--neon-cyan); margin-bottom: 15px; 
            border-radius: 0 8px 8px 0; text-shadow: 0 0 5px rgba(100,255,218,0.5);
        }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        /* 🚀 太空風格面板個股格子 */
        .card { 
            background: var(--panel-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 12px; padding: 22px; 
            border: 1px solid var(--panel-border); border-top: 4px solid var(--text-muted); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .card.is-buy { border-top-color: var(--neon-green); box-shadow: 0 0 20px rgba(0,230,118,0.15); }
        .card:hover { transform: translateY(-8px); border-color: var(--neon-cyan); box-shadow: 0 15px 35px rgba(100,255,218,0.2); }
        
        .stock-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.15); padding-bottom: 10px; margin-bottom: 15px; }
        .stock-id { font-size: 26px; font-weight: bold; color: var(--neon-cyan); font-family: 'Courier New', Courier, monospace; }
        .stock-name { font-size: 18px; font-weight: bold; color: var(--text-main); margin-left: 10px;}
        .inst-badge { background: rgba(255,215,0,0.05); padding: 4px 10px; border-radius: 4px; font-size: 12px; color: var(--neon-gold); font-weight: bold; border: 1px solid rgba(255,215,0,0.2);}
        
        .data-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: var(--text-muted); align-items: center; }
        .data-row b { color: var(--text-main); font-size: 16px; font-family: 'Consolas', monospace; }
        .highlight-price { color: var(--neon-cyan) !important; font-size: 20px !important; text-shadow: 0 0 10px rgba(100,255,218,0.4); }

        .action-box { margin-top: 18px; padding: 14px; text-align: center; font-weight: bold; border-radius: 6px; border: 1px solid transparent; letter-spacing: 2px; font-size: 15px; }
        .action-box.buy { background: rgba(0,230,118,0.15); color: var(--neon-green); border-color: rgba(0,230,118,0.5); text-shadow: 0 0 8px rgba(0,230,118,0.6); }
        .action-box.watch { background: rgba(136,146,176,0.1); color: var(--text-muted); border-color: rgba(136,146,176,0.2); }
        
        /* 修正後的底部資訊排版 */
        .footer-rules { font-size: 13px; margin-top: 18px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); line-height: 1.6; }
        .rule-item { display: block; margin-bottom: 6px; }
        .target { color: var(--neon-cyan); font-weight: bold; font-size: 15px; }
        .stop { color: var(--neon-red); font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌌 靜水流深｜全域雷達戰情室</h1>
        <div class="update-time" id="update-time">衛星同步中...</div>
    </div>

    <div id="main-container"></div>

    <script>
        fetch('plum_blossom_data.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(json_data => {
                document.getElementById('update-time').innerText = "⏱️ 雷達更新：" + json_data.last_updated;
                const container = document.getElementById('main-container');
                const pools = json_data.pools;
                
                for (const [poolName, stocks] of Object.entries(pools)) {
                    const section = document.createElement('div');
                    section.className = 'pool-section';
                    section.innerHTML = `<div class="pool-title">${poolName}</div>`;
                    
                    const grid = document.createElement('div');
                    grid.className = 'grid-container';
                    
                    stocks.forEach(s => {
                        const isBuy = s.action === '買入加碼';
                        const card = document.createElement('div');
                        card.className = `card ${isBuy ? 'is-buy' : ''}`;
                        
                        const instText = s.inst_buy > 0 ? '+' + s.inst_buy : s.inst_buy;

                        card.innerHTML = `
                            <div class="stock-header">
                                <div><span class="stock-id">${s.stock_id}</span> <span class="stock-name">${s.stock_name}</span></div>
                                <div class="inst-badge">法人籌碼 ${instText}</div>
                            </div>
                            <div class="data-row"><span>海浪最新收盤價 (現價)</span><b class="highlight-price">${s.close}</b></div>
                            <div class="data-row"><span>海浪成交量 (張)</span><b>${s.volume.toLocaleString()}</b></div>
                            <div class="data-row"><span>海浪5日均線 (5MA)</span><b>${s.ma5}</b></div>
                            <div class="data-row"><span>海浪30日月線 (30MA)</span><b>${s.ma30}</b></div>
                            
                            <div class="action-box ${isBuy ? 'buy' : 'watch'}">${isBuy ? '🚀 買入加碼 (Launch)' : '📡 靜候觀察 (Standby)'}</div>
                            
                            <div class="footer-rules">
                                <div class="rule-item">🎯 飛向太空50%獲利目標: <span class="target">${s.target_price}</span></div>
                                <div class="rule-item">✂️ 停利吃個小紅利或停損吃個小經驗的防線: <span class="stop">${s.stop_loss}</span></div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                    section.appendChild(grid);
                    container.appendChild(section);
                }
            })
            .catch(e => {
                document.getElementById('update-time').innerText = "⚠️ 衛星連線失敗";
                document.getElementById('main-container').innerHTML = "<div style='text-align:center; color: var(--neon-red); margin-top: 50px; font-weight:bold;'>[ ❌ 錯誤 ] 訊號遺失，請檢查資料庫連結。</div>";
            });
    </script>
</body>
</html>
