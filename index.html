<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全域雷達 V6.7｜匹夫有責｜彼夫有責楓葉戰情室</title>
    <style>
        /* =========================================
           1. 預設：太空深海風格 (Deep Ocean Space - 暗色系)
           ========================================= */
        :root {
            --ocean-bg: radial-gradient(circle at top, #0A192F 0%, #020C1B 100%);
            --panel-bg: rgba(16, 32, 64, 0.75);
            --panel-border: rgba(100, 255, 218, 0.2);
            --text-main: #E6F1FF;
            --text-muted: #8892B0;
            --neon-cyan: #64FFDA;
            --neon-green: #00E676;
            --neon-red: #FF5252;
            --neon-gold: #FFD700;
            /* 區塊與陰影底色 */
            --title-bg: rgba(0, 0, 0, 0.4);
            --badge-bg: rgba(0, 0, 0, 0.2);
            --sim-bg: rgba(0, 0, 0, 0.2);
            --input-bg: rgba(0, 0, 0, 0.3);
            --watch-bg: rgba(255, 255, 255, 0.05);
            --watch-border: rgba(255, 255, 255, 0.1);
            --card-shadow: rgba(0, 0, 0, 0.4);
        }

        /* =========================================
           2. 切換：加拿大淡楓葉風格 (Light Maple - 淺色柔和系)
           ========================================= */
        [data-theme="maple"] {
            /* 柔和的秋日奶茶/陽光漸層 */
            --ocean-bg: linear-gradient(135deg, #FFF6E5 0%, #FAD7A1 100%);
            /* 輕透的白玻璃質感 */
            --panel-bg: rgba(255, 255, 255, 0.75);
            --panel-border: rgba(211, 84, 0, 0.3);
            /* 文字改為深咖啡色確保閱讀舒適度 */
            --text-main: #3E2723;
            --text-muted: #795548;
            /* 提示色系轉為沉穩的秋色 */
            --neon-cyan: #D35400; /* 楓葉橘紅 */
            --neon-green: #2E7D32; /* 森林綠 */
            --neon-red: #C62828; /* 漿果紅 */
            --neon-gold: #E67E22;
            /* 區塊與陰影底色 (淺色模式適配) */
            --title-bg: rgba(255, 255, 255, 0.6);
            --badge-bg: rgba(255, 255, 255, 0.6);
            --sim-bg: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.8);
            --watch-bg: rgba(0, 0, 0, 0.03);
            --watch-border: rgba(0, 0, 0, 0.1);
            --card-shadow: rgba(0, 0, 0, 0.12); /* 陰影變淡，更輕盈 */
        }

        /* 基礎佈局 */
        body {
            background: var(--ocean-bg); 
            background-attachment: fixed;
            color: var(--text-main);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 20px; min-height: 100vh;
            transition: background 0.6s ease, color 0.6s ease; 
        }

        /* 👑 右上角主題切換按鈕 */
        .theme-toggle-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: var(--panel-bg); color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan); padding: 8px 16px;
            border-radius: 20px; cursor: pointer; font-weight: bold;
            transition: 0.3s ease; backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px var(--card-shadow); font-size: 14px;
        }
        .theme-toggle-btn:hover {
            box-shadow: 0 0 15px var(--panel-border);
            transform: translateY(-2px);
        }

        /* 頂部搜索與標題 */
        .top-nav {
            max-width: 1200px; margin: 0 auto 30px;
            display: flex; flex-direction: column; align-items: center;
            gap: 15px; border-bottom: 1px solid var(--panel-border); padding-bottom: 20px;
        }
        .search-box {
            background: var(--panel-bg); border: 1px solid var(--neon-cyan);
            border-radius: 30px; padding: 10px 25px; width: 100%; max-width: 400px;
            color: var(--text-main); font-size: 16px; outline: none;
            box-shadow: 0 0 15px var(--card-shadow); text-align: center;
            transition: 0.3s ease;
        }
        .search-box:focus { box-shadow: 0 0 25px var(--panel-border); }

        .header h1 { margin: 0; letter-spacing: 2px; text-shadow: 0 0 10px var(--panel-border); font-size: 28px; }
        .update-time { font-size: 12px; color: var(--neon-cyan); opacity: 0.8; margin-top: 5px; }

        /* 卡片區域 */
        .pool-section { margin-bottom: 50px; max-width: 1400px; margin-left: auto; margin-right: auto; }
        .pool-title { 
            font-size: 20px; font-weight: bold; color: var(--neon-cyan);
            background: var(--title-bg); padding: 12px 20px; 
            border-left: 4px solid var(--neon-cyan); margin-bottom: 20px; 
            border-radius: 0 8px 8px 0; transition: 0.5s ease;
        }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }

        .card { 
            background: var(--panel-bg); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 22px; border: 1px solid var(--panel-border);
            border-top: 4px solid var(--text-muted); box-shadow: 0 10px 30px var(--card-shadow);
            transition: 0.4s ease; position: relative;
        }
        .card.is-buy { border-top-color: var(--neon-green); }
        .card:hover { transform: translateY(-5px); border-color: var(--neon-cyan); box-shadow: 0 15px 35px var(--panel-border); }

        .stock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .stock-id { font-size: 26px; font-weight: bold; color: var(--neon-cyan); }
        .stock-name { font-size: 18px; color: var(--text-main); margin-left: 10px; }
        .inst-badge { background: var(--badge-bg); padding: 4px 10px; border-radius: 4px; font-size: 12px; color: var(--neon-gold); border: 1px solid var(--panel-border); transition: 0.5s ease;}

        .data-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: var(--text-muted); }
        .data-row b { color: var(--text-main); font-size: 16px; }
        .highlight { color: var(--neon-cyan) !important; font-size: 20px !important; }

        .sim-panel {
            margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--panel-border);
            background: var(--sim-bg); border-radius: 8px; padding: 12px; transition: 0.5s ease;
        }
        .sim-title { font-size: 12px; color: var(--neon-gold); margin-bottom: 10px; font-weight: bold; text-align: center; }
        .sim-input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .sim-input {
            width: 85%; background: var(--input-bg); border: 1px solid var(--panel-border);
            border-radius: 4px; color: var(--neon-cyan); padding: 5px; font-size: 13px; outline: none; transition: 0.5s ease;
        }
        
        .sim-result { font-size: 12px; border-top: 1px dashed var(--panel-border); padding-top: 10px; line-height: 1.6; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 5px; }

        .action-box { margin-top: 15px; padding: 12px; text-align: center; font-weight: bold; border-radius: 6px; font-size: 15px; transition: 0.5s ease;}
        .action-box.buy { background: rgba(0,255,0,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
        .action-box.watch { background: var(--watch-bg); color: var(--text-muted); border: 1px solid var(--watch-border); }

        /* 著作權與聲明樣式 */
        .footer-copyright {
            text-align: center; padding: 40px 20px; margin-top: 60px;
            border-top: 1px solid var(--panel-border); color: var(--text-muted);
            font-size: 12px; line-height: 1.8; letter-spacing: 1px;
        }
        .copyright-symbol { color: var(--neon-cyan); font-weight: bold; }
    </style>
</head>
<body>

    <button id="theme-toggle" class="theme-toggle-btn">🍁 切換柔和楓葉版</button>

    <div class="top-nav">
        <div class="header">
            <h1>🌌 匹夫有責｜彼夫有責楓葉戰情室</h1>
            <div class="update-time" id="update-time">衛星同步中...</div>
        </div>
        <input type="text" id="global-search" class="search-box" placeholder="🛸 啟動聲納：輸入汪洋大魚代碼進行探測...">
    </div>

    <div id="search-result-container" class="pool-section" style="display:none;">
        <div class="pool-title">🛰️ 搜尋結果探測</div>
        <div id="search-grid" class="grid-container"></div>
    </div>

    <div id="main-container"></div>

    <footer class="footer-copyright">
        <p><span class="copyright-symbol">©</span> <span id="current-year"></span> 彼夫有擇楓葉戰情室. All Rights Reserved.</p>
        <p style="opacity: 0.6; margin-top: 10px;">
            ⚠️ 本系統僅供量化投資模擬推演與技術測試之用，所提供之數據資訊不構成任何投資建議。<br>
            投資一定有風險，台股投資有賺有賠，申購前應詳閱公開說明書，入市請謹慎評估。
        </p>
    </footer>

    <script>
        // 設定著作權年份
        document.getElementById('current-year').innerText = new Date().getFullYear();

        // 👑 主題切換邏輯
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            const root = document.documentElement;
            if (root.getAttribute('data-theme') === 'maple') {
                root.removeAttribute('data-theme');
                themeBtn.innerText = '🍁 切換柔和楓葉版';
            } else {
                root.setAttribute('data-theme', 'maple');
                themeBtn.innerText = '🌌 切換深海太空版';
            }
        });

        let fullData = null;

        function updateSim(sid) {
            const price = parseFloat(document.getElementById(`price-${sid}`).value) || 0;
            if (price > 0) {
                document.getElementById(`profit-${sid}`).innerText = (price * 1.5).toFixed(2);
                document.getElementById(`loss-${sid}`).innerText = (price * 0.9).toFixed(2);
            } else {
                document.getElementById(`profit-${sid}`).innerText = '--';
                document.getElementById(`loss-${sid}`).innerText = '--';
            }
        }

        function createCard(s, isWangYang = false) {
            const isBuy = s.action === '買入加碼';
            const instText = s.inst_buy > 0 ? '+' + s.inst_buy : s.inst_buy;

            let simHtml = '';
            if (!isWangYang) {
                simHtml = `
                    <div class="sim-panel">
                        <div class="sim-title">🛠️ Beta user 模擬倉</div>
                        <div class="sim-input-group">
                            <div><input type="number" id="price-${s.stock_id}" class="sim-input" placeholder="持股價位" oninput="updateSim('${s.stock_id}')"></div>
                            <div><input type="number" id="shares-${s.stock_id}" class="sim-input" placeholder="持股股數"></div>
                        </div>
                        <div class="sim-result">
                            <div class="result-row"><span>🎯飛向太空建議停利點(+50%)</span><b class="target" id="profit-${s.stock_id}" style="color: var(--neon-cyan);">--</b></div>
                            <div class="result-row"><span>✂️ 返回人間停損點(-10%)</span><b class="stop" id="loss-${s.stock_id}" style="color: var(--neon-red);">--</b></div>
                        </div>
                    </div>
                `;
            } else {
                const autoProfit = (s.ma5 * 1.5).toFixed(2);
                const autoLoss = (s.ma5 * 0.9).toFixed(2);
                simHtml = `
                    <div class="sim-panel">
                        <div class="sim-title">🤖 系統自動導航 (基於5MA基準)</div>
                        <div class="sim-result" style="border-top:none; padding-top:0;">
                            <div class="result-row"><span>🎯飛向太空建議停利點(+50%)</span><b class="target" style="color: var(--neon-cyan);">${autoProfit}</b></div>
                            <div class="result-row"><span>✂️ 返回人間停損點(-10%)</span><b class="stop" style="color: var(--neon-red);">${autoLoss}</b></div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="card ${isBuy ? 'is-buy' : ''}">
                    <div class="stock-header">
                        <div><span class="stock-id">${s.stock_id}</span><span class="stock-name">${s.stock_name}</span></div>
                        <div class="inst-badge">30日法人買賣超 ${instText}</div>
                    </div>
                    <div class="data-row"><span>現價</span><b class="highlight">${s.close}</b></div>
                    <div class="data-row"><span>成交量 (張)</span><b>${s.volume.toLocaleString()}</b></div>
                    <div class="data-row"><span>5MA</span><b>${s.ma5}</b></div>
                    <div class="data-row"><span>30MA</span><b>${s.ma30}</b></div>
                    <div class="action-box ${isBuy ? 'buy' : 'watch'}">${isBuy ? '🚀 買入加碼 (Launch)' : '📡 靜候觀察 (Standby)'}</div>
                    ${simHtml}
                </div>
            `;
        }

        fetch('plum_blossom_data.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(json_data => {
                fullData = json_data;
                document.getElementById('update-time').innerText = "⏱️ 雷達更新：" + json_data.last_updated;
                const container = document.getElementById('main-container');
                
                for (const [poolName, stocks] of Object.entries(json_data.pools)) {
                    const section = document.createElement('div');
                    section.className = 'pool-section';
                    section.innerHTML = `<div class="pool-title">${poolName}</div>`;
                    const grid = document.createElement('div');
                    grid.className = 'grid-container';
                    
                    // 👑 汪洋大魚專屬雙重排序：法人買超(大->小) -> 股價(高->低)
                    let displayStocks = stocks;
                    if (poolName === "🌊 汪洋大魚") {
                        displayStocks = stocks.sort((a, b) => {
                            if (b.inst_buy !== a.inst_buy) {
                                return b.inst_buy - a.inst_buy;
                            }
                            return b.close - a.close;
                        });
                    }

                    displayStocks.forEach(s => {
                        grid.innerHTML += createCard(s, poolName === "🌊 汪洋大魚");
                    });
                    section.appendChild(grid);
                    container.appendChild(section);
                }
            })
            .catch(e => { console.error(e); });

        document.getElementById('global-search').addEventListener('input', (e) => {
            const code = e.target.value.trim();
            const searchGrid = document.getElementById('search-grid');
            const searchContainer = document.getElementById('search-result-container');
            if (code.length >= 2 && fullData) {
                searchGrid.innerHTML = '';
                let found = false;
                for (const stocks of Object.values(fullData.pools)) {
                    const match = stocks.find(s => s.stock_id === code);
                    if (match) {
                        searchGrid.innerHTML = createCard(match, false);
                        found = true;
                        break;
                    }
                }
                searchContainer.style.display = found ? 'block' : 'none';
            } else {
                searchContainer.style.display = 'none';
            }
        });
    </script>
</body>
</html>
