<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彼得老蘇戰情室｜隨浪逐流</title>
    <style>
        :root {
            --jp-indigo: #0F2540;   /* 深靛青 */
            --jp-sand: #F2EFE9;     /* 砂色/和紙 */
            --jp-red: #A61B1B;      /* 胭脂紅 */
            --jp-gold: #C5A059;     /* 金箔色 */
            --text-charcoal: #333333;
        }
        body {
            background-color: var(--jp-sand);
            color: var(--text-charcoal);
            font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", serif;
            margin: 0; padding: 20px;
            background-image: radial-gradient(var(--jp-indigo) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            background-opacity: 0.05;
        }
        .header {
            text-align: center;
            border-bottom: 2px solid var(--jp-indigo);
            padding-bottom: 20px; margin-bottom: 40px;
        }
        .header h1 { 
            color: var(--jp-indigo); 
            font-size: 32px; 
            letter-spacing: 4px; 
            margin-bottom: 5px;
        }
        .header p { font-style: italic; color: var(--jp-gold); }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px; max-width: 1200px; margin: 0 auto;
        }
        .card {
            background: white;
            border: 1px solid #ddd;
            border-top: 6px solid var(--jp-indigo);
            box-shadow: 6px 6px 0px rgba(15, 37, 64, 0.1);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .card::after {
            content: "🌊"; position: absolute; bottom: -10px; right: -5px;
            font-size: 40px; opacity: 0.1;
        }
        .stock-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 15px; border-bottom: 1px solid var(--jp-sand); padding-bottom: 8px;
        }
        .stock-id { font-size: 28px; font-weight: 900; color: var(--jp-indigo); }
        .stock-name { font-size: 18px; color: var(--jp-gold); margin-left: 10px; font-weight: bold; }
        
        .inst-badge {
            background: var(--jp-indigo); color: white;
            padding: 3px 10px; border-radius: 20px; font-size: 12px;
        }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dotted #eee; }
        .label { color: #888; font-size: 13px; }
        .val { font-weight: bold; font-family: "Courier New", monospace; }

        .action-box {
            margin-top: 20px; padding: 12px;
            text-align: center; font-weight: bold;
            border: 1.5px solid var(--jp-indigo);
            letter-spacing: 2px;
        }
        .buy { background-color: var(--jp-indigo); color: white; }
        .watch { border-style: dashed; color: var(--jp-indigo); }

        .footer-rules {
            font-size: 11px; margin-top: 15px; display: flex; justify-content: space-around;
            color: #666; background: #f9f9f9; padding: 5px;
        }
        .target { color: var(--jp-red); }
    </style>
</head>
<body>

    <div class="header">
        <h1>波濤之中｜隨浪逐流</h1>
        <p>— 彼得老蘇量化選股戰情室 —</p>
    </div>

    <div class="grid-container" id="main-list">
        </div>

    <script>
        fetch('plum_blossom_data.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('main-list');
                if(data.length === 0) {
                    container.innerHTML = "<div style='grid-column: 1/-1; text-align:center;'>今日海象平穩，靜候潮流。</div>";
                    return;
                }
                data.forEach(s => {
                    const actionClass = s.action === '買入' ? 'buy' : 'watch';
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="stock-header">
                            <div>
                                <span class="stock-id">${s.stock_id}</span>
                                <span class="stock-name">${s.stock_name}</span>
                            </div>
                            <span class="inst-badge">法人 30D +${s.inst_buy}張</span>
                        </div>
                        <div class="data-row"><span class="label">現價</span><span class="val">${s.close}</span></div>
                        <div class="data-row"><span class="label">量(張)</span><span class="val">${s.volume.toLocaleString()}</span></div>
                        <div class="data-row"><span class="label">5MA</span><span class="val">${s.ma5}</span></div>
                        
                        <div class="action-box ${actionClass}">
                            判定：${s.action === '買入' ? '🌊 順勢入倉' : '🧘 靜心觀察'}
                        </div>
                        
                        <div class="footer-rules">
                            <span>利: <b class="target">${s.target_price}</b></span>
                            <span>損: <b>${s.stop_loss}</b></span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(e => {
                document.getElementById('main-list').innerHTML = "資料讀取中或尚未上傳檔案...";
            });
    </script>
</body>
</html>
