name: 🚀 手動強制更新戰報 (Manual Update)

on:
  workflow_dispatch: # 手動按鈕觸發機制

# 頂層權限設定（與 auto_radar.yml 規範一致）
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 簽出代碼
        uses: actions/checkout@v4  # 使用最新穩定版本

      - name: 🐍 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: ⚡ 執行核心量化選股 (Radar)
        run: python -u radar.py  # -u 確保 Log 即時輸出，利於除錯
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}  # 從 Repository Secrets 注入 API 金鑰

      - name: 📤 自動提交並更新數據檔案
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add plum_blossom_data.json ocean_history.json log_report.json  # 精確指定產出檔案，避免污染倉庫
          git commit -m "🖐️ 手動更新：由指揮官手動觸發戰情室掃描" || echo "無變更需要提交"
          git push
